name: SonarCloud

on:
  push:
  pull_request:

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    env:
      DEPS_PREFIX: ${{ github.workspace }}/.sonar-deps
      CMAKE_PREFIX_PATH: ${{ github.workspace }}/.sonar-deps
      LD_LIBRARY_PATH: ${{ github.workspace }}/.sonar-deps/lib:${{ github.workspace }}/.sonar-deps/lib64
      CXXFLAGS: -Wno-pedantic -Wno-c++11-extensions -Wno-variadic-macros -Wno-overflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            wget \
            unzip \
            curl \
            software-properties-common \
            zlib1g-dev \
            libbz2-dev \
            libprotobuf-dev \
            protobuf-compiler \
            pkg-config \
            python3-pip \
            ninja-build \
            libboost-all-dev
          pip3 install --upgrade meson

      - name: Install CMake 3.27.7
        run: |
          wget -qO /tmp/cmake.sh https://github.com/Kitware/CMake/releases/download/v3.27.7/cmake-3.27.7-linux-x86_64.sh
          sudo sh /tmp/cmake.sh --skip-license --prefix=/usr/local
          rm -f /tmp/cmake.sh
          cmake --version

      - name: Cache SCIP + OR-Tools
        id: cache-native-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_PREFIX }}
          key: ${{ runner.os }}-scip-v924-ortools-v9.14-protobuf-headers-v2

      - name: Install SCIP + OR-Tools
        if: steps.cache-native-deps.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${DEPS_PREFIX}"

          git clone https://github.com/scipopt/scip.git /tmp/scip
          cd /tmp/scip
          git checkout v924
          git submodule update --init --recursive
          cmake -S /tmp/scip -B /tmp/scip/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DSCIP_ENABLE_PAPILO=OFF \
            -DSCIP_BUILD_TESTS=OFF \
            -DAUTOBUILD=ON \
            -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DSCIP_INSTALL=ON
          cmake --build /tmp/scip/build -j"$(nproc)"
          cmake --install /tmp/scip/build

          wget -qO /tmp/ortools.tar.gz https://github.com/google/or-tools/archive/refs/tags/v9.14.tar.gz
          tar -xzf /tmp/ortools.tar.gz -C /tmp
          cmake -S /tmp/or-tools-9.14 -B /tmp/or-tools-9.14/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DEPS=ON \
            -DBUILD_PYTHON=OFF \
            -DSCIP_ROOT="${DEPS_PREFIX}" \
            -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DCMAKE_CXX_STANDARD=17
          cmake --build /tmp/or-tools-9.14/build -j"$(nproc)"
          cmake --install /tmp/or-tools-9.14/build

      - name: Regenerate protobuf files
        run: |
          PROTOC_BIN="/usr/bin/protoc"
          "${PROTOC_BIN}" --version
          "${PROTOC_BIN}" --experimental_allow_proto3_optional -Ilibs/proto --cpp_out=libs/generated_proto libs/proto/*.proto

      - name: Configure build (PLD + Planner)
        run: meson setup build --buildtype=debug -Dwerror=false -Dwarning_level=1

      - name: Download Build Wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o build-wrapper.zip

      - name: Build with Build Wrapper
        run: ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bw-output meson compile -C build

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONARORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONARPROJECTKEY }}
            -Dsonar.projectName=I-Drone
            -Dsonar.sources=PLD,Planner,libs
